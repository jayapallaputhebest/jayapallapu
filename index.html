<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Happy Birthday Jaya! 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#f5c518;--gold2:#ffd966;--pink:#ff6eb4;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:#0b0c1e;font-family:'Dancing Script',cursive}

    /* ═══ START SCREEN ═══ */
    #start{
      position:fixed;inset:0;z-index:999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
      background:radial-gradient(ellipse 80% 80% at 50% 50%,#1a0a35 0%,#060610 100%);
    }
    #start-title{font-size:clamp(1.4rem,5vw,2.2rem);color:var(--gold);text-shadow:0 0 30px rgba(245,197,24,.7);animation:glow 2s ease-in-out infinite;text-align:center;line-height:1.5}
    @keyframes glow{0%,100%{opacity:.75}50%{opacity:1;text-shadow:0 0 50px rgba(245,197,24,.9)}}
    #open-btn{padding:16px 44px;font-size:1.15rem;font-family:'Dancing Script',cursive;font-weight:700;background:linear-gradient(135deg,var(--pink),#d63384);color:#fff;border:none;border-radius:50px;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 28px rgba(214,51,132,.55);transition:transform .15s}
    #open-btn:hover{transform:scale(1.05)}
    .start-sub{font-size:1rem;color:rgba(255,200,100,.45);margin-top:-10px}

    /* ═══ SCENE ═══ */
    #scene{position:fixed;inset:0;display:none;overflow:hidden}

    /* sky */
    #sky-layer{position:absolute;inset:0;z-index:0;background:linear-gradient(to bottom,#0d0b2e 0%,#1e154a 25%,#4a2060 55%,#b05030 80%,#e87840 100%)}
    .st{position:absolute;border-radius:50%;background:#fff;animation:twink var(--d) ease-in-out infinite}
    @keyframes twink{0%,100%{opacity:0}50%{opacity:1}}

    #moon{position:absolute;top:5%;right:10%;width:clamp(55px,9vw,80px);height:clamp(55px,9vw,80px);border-radius:50%;z-index:2;background:radial-gradient(circle at 38% 35%,#fffde0,#f5c518);box-shadow:0 0 35px rgba(245,197,24,.55),0 0 80px rgba(245,197,24,.22)}

    .cloud{position:absolute;border-radius:999px;z-index:1;background:rgba(255,200,230,.13);backdrop-filter:blur(3px);animation:drift linear infinite}
    @keyframes drift{from{transform:translateX(-300px)}to{transform:translateX(110vw)}}

    /* forest silhouette */
    #hills{position:absolute;bottom:0;left:0;width:100%;z-index:3;pointer-events:none}

    /* ground */
    #ground-layer{position:absolute;bottom:0;left:0;right:0;height:22%;z-index:4;background:linear-gradient(to bottom,#2e8b3f 0%,#1a5e25 60%,#0e3d18 100%);border-radius:55% 55% 0 0/30px 30px 0 0}
    .blade{position:absolute;bottom:0;border-radius:3px 3px 0 0;background:linear-gradient(to top,#1a5e25,#5dbc6a);transform-origin:bottom center;animation:sway var(--sd) ease-in-out infinite}
    @keyframes sway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
    .gf{position:absolute;bottom:0;z-index:6;font-size:clamp(16px,3.5vw,24px);animation:bob var(--bd) ease-in-out infinite;transform-origin:bottom center}
    @keyframes bob{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-5px)}}

    /* ── MAIN TREE SVG ── */
    #tree-svg{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);z-index:5;overflow:visible;width:clamp(260px,55vw,460px);height:clamp(340px,65vh,560px)}
    .trunk-path{fill:none;stroke:url(#trunkGrad);stroke-linecap:round;stroke-linejoin:round}
    .branch-path{fill:none;stroke:url(#branchGrad);stroke-linecap:round}
    .leaf-cluster{opacity:0;transform-origin:center;transform:scale(0);transition:opacity 1.2s ease,transform 1.2s cubic-bezier(.34,1.56,.64,1)}
    .leaf-cluster.bloom{opacity:1;transform:scale(1)}

    /* emoji flowers on tree */
    .tree-flower{position:absolute;pointer-events:none;z-index:8;opacity:0;transform:scale(0) rotate(0deg);transition:opacity .8s ease,transform .8s cubic-bezier(.34,1.56,.64,1)}
    .tree-flower.pop{opacity:1;transform:scale(1) rotate(var(--r))}

    /* photo */
    #photo-wrap{position:absolute;z-index:12;left:50%;transform:translateX(-50%) scale(0);opacity:0;transition:transform 1.8s cubic-bezier(.34,1.56,.64,1),opacity 1.4s ease;display:flex;flex-direction:column;align-items:center}
    #photo-circle{width:clamp(70px,15vw,120px);height:clamp(70px,15vw,120px);border-radius:50%;border:4px solid var(--gold);box-shadow:0 0 0 7px rgba(245,197,24,.18),0 0 35px rgba(245,197,24,.45);overflow:hidden;background:radial-gradient(circle,#1e1040,#0a0516);display:flex;align-items:center;justify-content:center;font-size:2.2rem;position:relative}
    #photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;z-index:2}

    /* name ring */
    #name-ring{position:absolute;z-index:13;left:50%;transform:translateX(-50%);width:clamp(200px,48vw,380px);height:clamp(200px,48vw,380px);opacity:0;transition:opacity 1.5s ease;pointer-events:none}
    #name-ring svg{width:100%;height:100%;animation:spin 14s linear infinite}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .ring-text{font-family:'Dancing Script',cursive;font-size:15px;font-weight:700;fill:var(--gold);filter:drop-shadow(0 0 6px rgba(245,197,24,.9))}

    /* HB banner */
    #hb{position:absolute;top:88%;left:50%;transform:translateX(-50%);font-size:clamp(1.5rem,4.5vw,2.8rem);color:var(--gold);text-shadow:0 0 25px rgba(245,197,24,.8),0 2px 4px rgba(0,0,0,.6);z-index:20;opacity:0;white-space:nowrap;letter-spacing:2px;transition:opacity 1.5s ease;animation:float 3.5s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-9px)}}

    /* birds */
    .bird{position:absolute;z-index:7;white-space:nowrap;color:var(--gold2);font-size:clamp(11px,2.2vw,15px);text-shadow:0 0 8px rgba(245,197,24,.5);animation:bfly linear;opacity:0}
    @keyframes bfly{0%{transform:translateX(-180px);opacity:0}4%{opacity:1}94%{opacity:1}100%{transform:translateX(110vw);opacity:0}}

    /* petals */
    .petal{position:fixed;top:-55px;z-index:100;pointer-events:none;animation:petFall linear forwards}
    @keyframes petFall{0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:1}100%{transform:translateY(115vh) rotate(800deg) translateX(var(--dx));opacity:.3}}

    /* fireworks */
    .fw{position:fixed;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:101;animation:fwPop .9s ease-out forwards}
    @keyframes fwPop{0%{transform:translate(0,0);opacity:1}100%{transform:translate(var(--fx),var(--fy));opacity:0}}

    /* wish */
    #wish{position:fixed;bottom:9%;left:50%;transform:translateX(-50%);z-index:30;opacity:0;transition:opacity 2s ease;text-align:center;pointer-events:none}
    #wish p{font-size:clamp(.9rem,2.5vw,1.35rem);color:rgba(255,255,255,.88);text-shadow:0 2px 10px rgba(0,0,0,.7);line-height:1.7}
  </style>
</head>
<body>

  <button id="open-btn" onclick="celebrate()">🎁 Tap to Open</button>

<div id="scene">

    <path id="bl1a" d="M108,246 C95,230 82,218 65,208"  class="branch-path" stroke-width="7"  stroke-dasharray="90"  stroke-dashoffset="90"/>
    <path id="bl1b" d="M90,232 C78,218 68,204 52,196"   class="branch-path" stroke-width="5.5" stroke-dasharray="75" stroke-dashoffset="75"/>
    <path id="bl1c" d="M70,218 C58,208 46,198 32,194"   class="branch-path" stroke-width="4"  stroke-dasharray="65"  stroke-dashoffset="65"/>
    <!-- right big branch at mid-height -->
    <path id="br1"  d="M163,248 C183,228 210,206 242,190" class="branch-path" stroke-width="10" stroke-dasharray="200" stroke-dashoffset="200"/>

    <path id="bt1a" d="M112,108 C100,92 88,78 72,68"       class="branch-path" stroke-width="4.5" stroke-dasharray="75" stroke-dashoffset="75"/>
    <path id="bt2"  d="M162,115 C180,92 202,75 226,62"     class="branch-path" stroke-width="6.5" stroke-dasharray="130" stroke-dashoffset="130"/>
    <path id="bt2a" d="M198,82 C212,66 222,52 238,42"      class="branch-path" stroke-width="4.5" stroke-dasharray="75" stroke-dashoffset="75"/>

    <!-- ═══ LEAF CLUSTERS ═══ -->

<script>
const $=id=>document.getElementById(id);
const PETALS=['🌸','🌺','🌼','🌷','💐','🌻'];
const GOLDS =['✨','⭐','🌟','💛','🔆','🏵️'];
const BIRDS_TXT=['🕊️ Happy Birthday!','🐦 Jaya, you\'re amazing!','🦋 Wishing you joy!','🕊️ Many more to come 🌸'];

/* ── stars ── */
function makeStars(){
  const sky=$('sky-layer');
  for(let i=0;i<130;i++){
    const s=document.createElement('div');s.className='st';
    const sz=Math.random()<.15?3:Math.random()<.4?2:1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*78}%;--d:${(Math.random()*2.5+.8).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
    sky.appendChild(s);
  }
}

/* ── clouds ── */
function makeClouds(){
  [[160,.35,7,6],[100,.22,13,3],[220,.28,9,10],[90,.18,17,8],[140,.3,11,0]].forEach(([w,h,dur,del])=>{
    const c=document.createElement('div');c.className='cloud';
    c.style.cssText=`width:${w}px;height:${w*h}px;top:${4+Math.random()*28}%;left:-${w}px;animation-duration:${dur}s;animation-delay:${del}s`;
    $('sky-layer').appendChild(c);
  });
}

/* ── grass + ground flowers ── */
function makeGrass(){
  const g=$('ground-layer');
  for(let i=0;i<80;i++){
    const b=document.createElement('div');b.className='blade';
    b.style.cssText=`left:${Math.random()*100}%;height:${Math.random()*28+10}px;width:${Math.random()<.5?2:3}px;--sd:${(Math.random()*2+2).toFixed(1)}s;animation-delay:${(Math.random()*2).toFixed(1)}s`;
    g.appendChild(b);
  }
  for(let i=0;i<24;i++){
    const f=document.createElement('div');f.className='gf';
    f.textContent=PETALS[Math.floor(Math.random()*PETALS.length)];
    f.style.cssText=`left:${Math.random()*90+2}%;--bd:${(Math.random()*1.5+2).toFixed(1)}s;animation-delay:${(Math.random()*2).toFixed(1)}s`;
    g.appendChild(f);
  }
}

/* ── birds ── */
function makeBirds(){
  BIRDS_TXT.forEach((txt,i)=>{
    const b=document.createElement('div');b.className='bird';b.textContent=txt;
    b.style.cssText=`top:${7+i*7}%;left:-180px;animation-duration:${14+i*3}s;animation-delay:${i*4+2}s`;
    $('scene').appendChild(b);
  });
}

/* ── petals ── */
function spawnPetal(){
  const p=document.createElement('div');p.className='petal';
  p.textContent=PETALS[Math.floor(Math.random()*PETALS.length)];
  const sz=Math.random()*18+12,dur=Math.random()*4+5;
  p.style.cssText=`left:${Math.random()*110-5}vw;font-size:${sz}px;animation-duration:${dur}s;--dx:${(Math.random()-.5)*130}px`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),dur*1000+100);
}
function burstPetals(){for(let i=0;i<120;i++)setTimeout(spawnPetal,i*30);}
function gentlePetals(){setInterval(spawnPetal,350);}

/* ── fireworks ── */
const FWC=['#f5c518','#ff6eb4','#fff','#a0e4ff','#c0b0ff','#ffb347'];
function firework(x,y){
  for(let i=0;i<20;i++){
    const d=document.createElement('div');d.className='fw';
    const a=(i/20)*Math.PI*2,dist=Math.random()*90+35;
    d.style.cssText=`left:${x}px;top:${y}px;background:${FWC[i%FWC.length]};--fx:${Math.cos(a)*dist}px;--fy:${Math.sin(a)*dist}px`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),900);
  }
}
function salvo(){for(let i=0;i<5;i++)setTimeout(()=>firework(Math.random()*innerWidth,Math.random()*innerHeight*.5),i*280);}

/* ── animate SVG stroke draw-on ── */
function animPath(id,dur,delay){
  const el=$(id);if(!el)return;
  let len=200;
  try{len=el.getTotalLength();}catch(e){}
  el.style.strokeDasharray=len;
  el.style.strokeDashoffset=len;
  el.style.transition=`stroke-dashoffset ${dur}s ease ${delay}s`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.strokeDashoffset='0';}));
}

/* ── bloom emoji flowers ON the tree ── */
function bloomTreeFlowers(treeRect){
  // spots: [relX from tree-center, relY from tree-top, delay-ms]
  const cx=treeRect.left+treeRect.width/2;
  const ty=treeRect.top;
  const spots=[
    [-88,28,0],   [88,36,70],   [-58,72,150],  [65,68,220],
    [-108,106,110],[102,100,190],[-48,148,290], [46,152,360],
    [2,40,55],    [-128,65,400],[128,75,480],   [-78,198,330],
    [76,190,270], [-28,192,450],[28,96,135],    [-18,16,520],
    [16,8,590],   [-68,238,470],[62,242,545],   [0,275,605],
    [-98,158,210],[98,162,250], [-38,118,175],  [36,115,310],
    [0,130,400],  [-155,50,560],[155,55,600],   [-140,90,640],
    [140,95,680], [-50,30,720], [50,25,760],
  ];
  const scene=$('scene');
  const scR=scene.getBoundingClientRect();
  spots.forEach(([rx,ry,delay])=>{
    const f=document.createElement('div');
    f.className='tree-flower';
    const allEmoji=[...PETALS,...GOLDS];
    f.textContent=allEmoji[Math.floor(Math.random()*allEmoji.length)];
    const sz=Math.random()*10+14;
    f.style.cssText=`left:${cx-scR.left+rx-sz/2}px;top:${ty-scR.top+ry}px;font-size:${sz}px;--r:${Math.random()*360}deg`;
    scene.appendChild(f);
    setTimeout(()=>f.classList.add('pop'),delay+3600);
  });
}

/* ── position photo & ring above canopy ── */
function positionOverTree(treeRect){
  const pw=$('photo-wrap'),ring=$('name-ring'),scene=$('scene');
  const scR=scene.getBoundingClientRect();
  const photoD=parseInt(getComputedStyle($('photo-circle')).width)||100;
  const treeTopRel=treeRect.top-scR.top;

  // photo: centered, sit just above top of SVG canopy
  pw.style.top=Math.max(2,treeTopRel-photoD*0.55)+'px';

  const ringW=ring.offsetWidth||260;
  ring.style.top=Math.max(0,treeTopRel-ringW/2+photoD/2-8)+'px';

  setTimeout(()=>{ pw.style.opacity='1'; pw.style.transform='translateX(-50%) scale(1)'; },5000);
  setTimeout(()=>{ ring.style.opacity='1'; },5400);
}

/* ── GROW TREE sequence ── */
function growTree(){
  const svg=$('tree-svg');

  // Trunk first
  animPath('trunk-left', 2.2, 0.1);
  animPath('trunk-right',2.2, 0.15);

  // Branches in timed sequence
  [
    ['bl1',1.3,1.5],['br1',1.3,1.7],
    ['bl1a',.9,2.3],['br1a',.9,2.4],
    ['bl1b',.75,2.7],['br1b',.75,2.8],['bl1c',.6,3.0],
    ['bl2',1.1,1.9],['br2',1.1,2.0],
    ['bl2a',.85,2.5],['br2a',.85,2.6],['bl2b',.65,2.9],
    ['bt1',.9,2.1],['bt2',.9,2.2],
    ['bt1a',.72,2.7],['bt2a',.72,2.8],
    ['bt3',.8,2.4],
  ].forEach(([id,dur,del])=>animPath(id,dur,del));

  // Leaf clusters bloom with stagger
  const leafIds=['lc0','lc1','lc2','lc17','lc18','lc3','lc4','lc5','lc6','lc7','lc8','lc9','lc10','lc11','lc12','lc13','lc14','lc15','lc16'];
  leafIds.forEach((id,i)=>setTimeout(()=>{ const el=$(id);if(el)el.classList.add('bloom'); },3100+i*85));

  // Flowers pop after leaves
  setTimeout(()=>{
    const r=svg.getBoundingClientRect();
    bloomTreeFlowers(r);
    positionOverTree(r);
  }, 3300);
}

/* ── MAIN ── */
function celebrate(){
  $('start').style.display='none';
  $('scene').style.display='block';

  makeStars();makeClouds();makeGrass();makeBirds();
  $('song').play().catch(()=>{});

  burstPetals();
  setTimeout(gentlePetals,5500);
  salvo();setTimeout(salvo,3000);setTimeout(salvo,7500);

  growTree();
  setTimeout(()=>$('hb').style.opacity='1',1200);
  setTimeout(()=>$('wish').style.opacity='1',7500);
}
